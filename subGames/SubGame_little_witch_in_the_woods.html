    <!-- 게임 이름 -->

    <!-- 게임 플레이 이미지 -->
    <img src="../assets/img/little witch in the woods.jpg"
     alt="게임 플레이 이미지" class="sub-image">

    <!-- 기본 정보 -->
    <section class="info-box">
        <div>
            <h3>장르</h3>
            <p>어드벤처, RPG</p>
        </div>

     <section>
        <h2>게임 소개</h2>

            견습 마녀 엘리가 신비로운 숲속 마을에서 물약을 만들고 사람들을 도우며 성장해 나가는 힐링 어드벤처 게임.

            <li>높은 몰입감의 생활 콘텐츠</li>
        </ul>

    <!-- 개발사 -->

        </p>

    <!-- 링크 -->
