    <!-- 기본 정보 -->
    <section class="info-box">
        <div>
            <h3>장르</h3>
            <p>덱 빌딩, 전략, 로그라이크</p>

            <li>높은 전략성</li>
            <li>뛰어난 반복 플레이 가치</li>
            <li>간결하지만 깊이 있는 시스템</li>
